name = "victrixhominum-api"
main = "api-worker.js"
compatibility_date = "2024-01-01"
no_bundle = true

[vars]
ALLOWED_ORIGINS = "https://victrixhominum.github.io,http://127.0.0.1:5173,http://localhost:5173"
ALLOWED_USER = "VictrixHominum"

[[r2_buckets]]
binding = "BLOG_BUCKET"
bucket_name = "victrixhominum-blog"

# ------------------------------------------------------------------
# Setup: run this from the worker/ directory:
#
#   wrangler secret put GITHUB_CLIENT_SECRET
#
# Paste the client secret from your GitHub OAuth App when prompted.
# (Settings → Developer settings → OAuth Apps → your app → Client secrets)
#
# The client_id is sent by the frontend at runtime, so only the
# secret needs to be stored here.
#
# ALLOWED_USER restricts login to a single GitHub account. The worker
# verifies identity server-side by calling GitHub's /user API with
# the token — a spoofed username in the request body is ignored.
# If the user doesn't match, the token is revoked and never returned.
# ------------------------------------------------------------------
